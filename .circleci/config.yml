version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.11

    working_directory: ~/project

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      - run:
          name: Run tests
          command: |
            mkdir -p test-results
            pytest -s --junitxml=test-results/results.xml

      - store_test_results:
          path: test-results

      - store_artifacts:
          path: test-results

workflows:
  version: 2
  test-workflow:
    jobs:
      - test